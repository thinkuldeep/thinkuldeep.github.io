<!DOCTYPE html>

<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCA-F · Foundations Mock Exam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:        #f5f1e8;
    --paper-warm:   #ede6d3;
    --ink:          #1a1814;
    --ink-soft:     #45403a;
    --ink-faint:    #8a847a;
    --rule:         #cdc4b0;
    --accent:       #b94e2a;     /* burnt orange */
    --accent-dark:  #8c3a1f;
    --green:        #2c6e49;
    --green-soft:   #d8e8de;
    --red:          #a8331f;
    --red-soft:     #f1d8d2;
    --gold:         #b88a2c;
    --gold-soft:    #ece1c0;
    --shadow:       0 1px 0 rgba(26,24,20,.05), 0 6px 20px -10px rgba(26,24,20,.15);
  }

- { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
  font-family: ‘Inter Tight’, system-ui, sans-serif;
  background: var(–paper);
  color: var(–ink);
  line-height: 1.55;
  min-height: 100vh;
  /* subtle paper texture */
  background-image:
  radial-gradient(rgba(26,24,20,.025) 1px, transparent 1px),
  radial-gradient(rgba(26,24,20,.018) 1px, transparent 1px);
  background-size: 32px 32px, 17px 17px;
  background-position: 0 0, 9px 11px;
  }

/* Display & typography */
h1, h2, h3, h4 { font-family: ‘Fraunces’, serif; font-weight: 500; letter-spacing: -0.01em; color: var(–ink); margin: 0; }
h1 { font-size: clamp(2.4rem, 5vw, 3.6rem); line-height: 1; font-weight: 900; letter-spacing: -0.03em; }
h2 { font-size: 1.6rem; }
h3 { font-size: 1.2rem; }
code, .mono { font-family: ‘JetBrains Mono’, monospace; font-size: 0.92em; }

/* Layout */
.wrap { max-width: 920px; margin: 0 auto; padding: 48px 28px 96px; }
.topbar {
display: flex; align-items: center; justify-content: space-between;
border-bottom: 1px solid var(–rule);
padding-bottom: 14px; margin-bottom: 36px;
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase;
color: var(–ink-soft);
}
.topbar .stamp { color: var(–accent); font-weight: 700; }
.topbar .right { display: flex; gap: 18px; align-items: center; }

/* Hero (home view) */
.hero { margin-bottom: 56px; position: relative; }
.hero .kicker {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase;
color: var(–accent); margin-bottom: 14px;
}
.hero .sub {
font-family: ‘Fraunces’, serif;
font-size: 1.25rem; font-style: italic; color: var(–ink-soft);
margin-top: 18px; max-width: 640px; font-weight: 400;
}
.hero .quill {
position: absolute; top: -20px; right: -10px;
font-family: ‘Fraunces’, serif; font-size: 14rem; line-height: 1;
color: rgba(185, 78, 42, 0.07); pointer-events: none; user-select: none;
font-weight: 900;
}

/* Cards */
.card {
background: #faf6ec;
border: 1px solid var(–rule);
padding: 28px 30px;
box-shadow: var(–shadow);
margin-bottom: 22px;
}
.card-title {
display: flex; align-items: baseline; gap: 14px; margin-bottom: 18px;
}
.card-title h2 { margin: 0; }
.card-title .num {
font-family: ‘JetBrains Mono’, monospace; font-size: 0.75rem;
color: var(–ink-faint); letter-spacing: 0.12em;
}

/* Mode picker */
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 640px) { .mode-grid { grid-template-columns: 1fr; } }
.mode {
border: 1px solid var(–rule); background: var(–paper-warm);
padding: 22px; cursor: pointer; transition: all .15s ease;
position: relative;
}
.mode:hover { border-color: var(–accent); transform: translateY(-2px); }
.mode.selected {
border-color: var(–accent); background: #fff;
box-shadow: inset 4px 0 0 var(–accent);
}
.mode h3 { margin-bottom: 6px; }
.mode p { margin: 0; font-size: 0.92rem; color: var(–ink-soft); }
.mode .badge {
position: absolute; top: 14px; right: 14px;
font-family: ‘JetBrains Mono’, monospace; font-size: 0.7rem;
color: var(–ink-faint); letter-spacing: 0.1em; text-transform: uppercase;
}

/* Settings row */
.settings-row { display: flex; gap: 22px; flex-wrap: wrap; align-items: flex-end; margin-top: 12px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
font-family: ‘JetBrains Mono’, monospace; font-size: 0.72rem;
letter-spacing: 0.1em; text-transform: uppercase; color: var(–ink-faint);
}
.field input[type=“number”], .field select {
font-family: ‘Inter Tight’, sans-serif; font-size: 1rem;
padding: 8px 12px; background: #fff; color: var(–ink);
border: 1px solid var(–rule); border-radius: 0;
min-width: 120px;
}
.field input[type=“number”]:focus, .field select:focus {
outline: none; border-color: var(–accent);
}

/* Buttons */
.btn {
font-family: ‘Inter Tight’, sans-serif; font-size: 0.95rem; font-weight: 600;
padding: 12px 22px; border: 1px solid var(–ink); background: var(–ink);
color: var(–paper); cursor: pointer; transition: all .15s ease;
letter-spacing: 0.02em; border-radius: 0;
}
.btn:hover { background: var(–accent); border-color: var(–accent); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.secondary { background: transparent; color: var(–ink); }
.btn.secondary:hover { background: var(–ink); color: var(–paper); }
.btn.ghost { background: transparent; color: var(–ink-soft); border-color: var(–rule); }
.btn.ghost:hover { color: var(–accent); border-color: var(–accent); background: transparent; }
.btn.danger { border-color: var(–red); color: var(–red); background: transparent; }
.btn.danger:hover { background: var(–red); color: var(–paper); }
.btn.lg { padding: 16px 32px; font-size: 1.05rem; }
.actions-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }

/* Resume banner */
.resume {
background: var(–gold-soft); border: 1px solid var(–gold);
padding: 16px 20px; margin-bottom: 22px;
display: flex; align-items: center; justify-content: space-between; gap: 18px; flex-wrap: wrap;
}
.resume .lbl { font-family: ‘JetBrains Mono’, monospace; font-size: 0.74rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(–ink-soft); }
.resume strong { font-family: ‘Fraunces’, serif; font-weight: 700; font-size: 1.05rem; }

/* Exam view */
.exam-header {
display: flex; align-items: center; justify-content: space-between;
background: var(–ink); color: var(–paper);
padding: 14px 24px; margin-bottom: 0;
font-family: ‘JetBrains Mono’, monospace; font-size: 0.85rem;
letter-spacing: 0.05em;
position: sticky; top: 0; z-index: 10;
}
.exam-header .progress-text { color: var(–paper-warm); }
.exam-header .timer { font-weight: 700; font-size: 1rem; }
.exam-header .timer.warn { color: var(–gold); }
.exam-header .timer.danger { color: #ff8c70; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 50% { opacity: 0.55; } }

.progress-bar { height: 3px; background: var(–rule); position: relative; }
.progress-bar .fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(–accent); transition: width .3s ease; }

/* Scenario banner — frames the block of questions sharing one scenario */
.scenario-banner {
background: var(–ink); color: var(–paper);
padding: 22px 30px; border-bottom: 3px solid var(–accent);
display: flex; align-items: flex-start; justify-content: space-between; gap: 24px;
flex-wrap: wrap;
}
.scenario-banner .left { flex: 1; min-width: 240px; }
.scenario-banner .kicker {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
color: var(–accent); margin-bottom: 8px;
}
.scenario-banner .title {
font-family: ‘Fraunces’, serif; font-size: 1.6rem; font-weight: 700;
line-height: 1.15; letter-spacing: -0.01em; color: var(–paper);
}
.scenario-banner .meta {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.78rem; letter-spacing: 0.06em; color: var(–paper-warm);
white-space: nowrap; padding-top: 6px;
}
.scenario-banner .meta strong { color: var(–paper); }
.scenario-banner.new-block {
animation: bannerIn 0.35s ease;
}
@keyframes bannerIn {
from { opacity: 0; transform: translateY(-6px); }
to   { opacity: 1; transform: translateY(0); }
}
.new-block-flag {
display: inline-block;
font-family: ‘JetBrains Mono’, monospace; font-size: 0.7rem;
letter-spacing: 0.14em; text-transform: uppercase;
color: var(–ink); background: var(–accent);
padding: 3px 10px; margin-top: 10px;
border-radius: 0;
}

/* Question */
.question-card {
background: #faf6ec; border: 1px solid var(–rule); border-top: none;
padding: 36px 38px; box-shadow: var(–shadow);
}
.q-meta {
display: flex; gap: 16px; align-items: center; margin-bottom: 18px;
font-family: ‘JetBrains Mono’, monospace; font-size: 0.74rem;
color: var(–ink-faint); letter-spacing: 0.08em; text-transform: uppercase;
flex-wrap: wrap;
}
.q-meta .pill {
background: var(–paper-warm); padding: 4px 10px; border: 1px solid var(–rule);
}
.q-meta .pill.domain { background: var(–ink); color: var(–paper); border-color: var(–ink); }
.q-text {
font-family: ‘Fraunces’, serif; font-size: 1.32rem; line-height: 1.4;
color: var(–ink); font-weight: 500; margin-bottom: 28px;
}

/* Choices */
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice {
display: flex; gap: 16px; padding: 16px 18px;
background: #fff; border: 1px solid var(–rule); cursor: pointer;
transition: all .12s ease; position: relative;
}
.choice:hover { border-color: var(–ink-soft); background: #fffdf5; }
.choice.selected {
border-color: var(–accent); background: #fff;
box-shadow: inset 4px 0 0 var(–accent);
}
.choice .letter {
font-family: ‘JetBrains Mono’, monospace; font-weight: 700;
font-size: 1rem; color: var(–accent);
flex-shrink: 0; width: 24px;
}
.choice .body { font-size: 1rem; color: var(–ink); }
.choice.locked { cursor: default; }
.choice.correct {
border-color: var(–green); background: var(–green-soft);
box-shadow: inset 4px 0 0 var(–green);
}
.choice.correct .letter { color: var(–green); }
.choice.incorrect-selected {
border-color: var(–red); background: var(–red-soft);
box-shadow: inset 4px 0 0 var(–red);
}
.choice.incorrect-selected .letter { color: var(–red); }
.choice .explanation {
grid-column: 2;
margin-top: 10px;
font-size: 0.92rem; line-height: 1.5;
color: var(–ink-soft); font-style: italic;
display: none;
border-top: 1px dashed var(–rule); padding-top: 10px;
}
.choice.show-expl { display: flex; flex-direction: column; }
.choice.show-expl .explanation { display: block; }
.choice.show-expl .top-row { display: flex; gap: 16px; }

/* Nav */
.qnav {
display: flex; justify-content: space-between; gap: 12px;
margin-top: 26px; padding-top: 22px;
border-top: 1px solid var(–rule); align-items: center;
}
.qnav-spacer { flex: 1; }
.qnav .nums {
font-family: ‘JetBrains Mono’, monospace; font-size: 0.78rem;
color: var(–ink-faint); letter-spacing: 0.06em;
}

/* Question grid (sidebar replacement) */
.qgrid-section { margin-top: 14px; }
.qgrid-scenario-block { margin-bottom: 14px; }
.qgrid-scenario-label {
font-family: ‘JetBrains Mono’, monospace; font-size: 0.7rem;
letter-spacing: 0.1em; text-transform: uppercase;
color: var(–ink-faint); margin-bottom: 6px;
display: flex; align-items: center; gap: 8px;
}
.qgrid-scenario-label::before {
content: ‘’; display: inline-block; width: 8px; height: 8px;
background: var(–accent);
}
.qgrid {
display: grid; grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
gap: 6px;
}
.qgrid button {
aspect-ratio: 1; border: 1px solid var(–rule); background: #fff;
font-family: ‘JetBrains Mono’, monospace; font-size: 0.78rem;
color: var(–ink-soft); cursor: pointer; padding: 0; border-radius: 0;
}
.qgrid button:hover { border-color: var(–ink); }
.qgrid button.answered { background: var(–ink); color: var(–paper); border-color: var(–ink); }
.qgrid button.flagged {
background: var(–gold-soft); border-color: var(–gold);
color: var(–ink); position: relative;
}
.qgrid button.flagged.answered::after {
content: ‘’; position: absolute; top: 2px; right: 2px;
width: 6px; height: 6px; background: var(–accent); border-radius: 50%;
}
.qgrid button.current { outline: 2px solid var(–accent); outline-offset: 2px; }

/* Results */
.score-hero {
text-align: center; padding: 48px 28px;
background: linear-gradient(180deg, var(–paper-warm) 0%, transparent 100%);
border: 1px solid var(–rule);
margin-bottom: 28px;
}
.score-hero .label {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase;
color: var(–ink-soft); margin-bottom: 12px;
}
.score-hero .score {
font-family: ‘Fraunces’, serif; font-size: 6rem; line-height: 1;
font-weight: 900; letter-spacing: -0.04em;
color: var(–ink);
}
.score-hero .score.pass { color: var(–green); }
.score-hero .score.fail { color: var(–red); }
.score-hero .of { font-size: 1.4rem; color: var(–ink-faint); margin-left: 8px; font-weight: 400; }
.score-hero .verdict {
font-family: ‘Fraunces’, serif; font-size: 1.4rem; font-style: italic;
margin-top: 16px;
}
.score-hero .verdict.pass { color: var(–green); }
.score-hero .verdict.fail { color: var(–red); }
.score-hero .raw {
margin-top: 18px; font-family: ‘JetBrains Mono’, monospace;
font-size: 0.85rem; color: var(–ink-soft);
}

.breakdown { display: grid; grid-template-columns: 1fr; gap: 12px; }
.domain-row {
display: grid; grid-template-columns: 1fr 80px 100px;
align-items: center; gap: 14px;
padding: 14px 18px;
background: #faf6ec; border: 1px solid var(–rule);
}
.domain-row .name { font-family: ‘Fraunces’, serif; font-size: 1.05rem; font-weight: 500; }
.domain-row .weight { font-family: ‘JetBrains Mono’, monospace; font-size: 0.78rem; color: var(–ink-faint); }
.domain-row .bar {
height: 8px; background: var(–rule); position: relative; overflow: hidden;
}
.domain-row .bar .fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(–green); }
.domain-row .bar .fill.low { background: var(–red); }
.domain-row .bar .fill.mid { background: var(–gold); }
.domain-row .pct { font-family: ‘JetBrains Mono’, monospace; font-weight: 700; font-size: 0.95rem; text-align: right; }

/* Review of all questions in results */
.review-section { margin-top: 36px; }
.review-scenario-header {
display: flex; align-items: baseline; gap: 14px;
margin: 24px 0 12px 0;
padding-bottom: 8px;
border-bottom: 2px solid var(–ink);
}
.review-scenario-header:first-of-type { margin-top: 4px; }
.review-scenario-header h3 {
font-family: ‘Fraunces’, serif; font-weight: 700; font-size: 1.25rem;
margin: 0;
}
.review-scenario-header .stats {
font-family: ‘JetBrains Mono’, monospace; font-size: 0.78rem;
color: var(–ink-faint); letter-spacing: 0.06em; margin-left: auto;
}
.review-scenario-header .stats .ok { color: var(–green); font-weight: 700; }
.review-scenario-header .stats .bad { color: var(–red); font-weight: 700; }
.review-item {
border: 1px solid var(–rule);
background: #faf6ec;
margin-bottom: 14px;
padding: 0;
}
.review-item summary {
padding: 14px 18px; cursor: pointer; list-style: none;
display: flex; gap: 14px; align-items: center;
font-family: ‘Inter Tight’, sans-serif; font-size: 0.98rem;
}
.review-item summary::-webkit-details-marker { display: none; }
.review-item summary::before {
content: ‘+’; font-family: ‘JetBrains Mono’, monospace; font-size: 1.2rem;
color: var(–accent); width: 16px;
}
.review-item[open] summary::before { content: ‘−’; }
.review-item .marker {
width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.review-item .marker.correct { background: var(–green); }
.review-item .marker.wrong { background: var(–red); }
.review-item .marker.skipped { background: var(–ink-faint); }
.review-item .summary-text { flex: 1; color: var(–ink); }
.review-item .summary-meta {
font-family: ‘JetBrains Mono’, monospace; font-size: 0.72rem;
color: var(–ink-faint); letter-spacing: 0.06em;
}
.review-body { padding: 0 18px 20px 18px; }
.review-body .q-text { font-size: 1.1rem; margin-bottom: 18px; }

/* History list */
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-row {
display: grid; grid-template-columns: 1fr auto auto auto;
align-items: center; gap: 14px;
padding: 12px 16px; background: var(–paper-warm); border: 1px solid var(–rule);
font-family: ‘JetBrains Mono’, monospace; font-size: 0.85rem;
}
.history-row .date { color: var(–ink-soft); }
.history-row .score { font-weight: 700; font-size: 1rem; }
.history-row .pass { color: var(–green); }
.history-row .fail { color: var(–red); }
.history-row .mode-lbl { color: var(–ink-faint); text-transform: uppercase; font-size: 0.72rem; }

/* Misc */
.muted { color: var(–ink-faint); }
.small { font-size: 0.85rem; }
.center { text-align: center; }
hr.rule { border: 0; border-top: 1px solid var(–rule); margin: 32px 0; }
.flag-btn {
background: transparent; border: 1px solid var(–rule);
padding: 8px 14px; font-family: ‘JetBrains Mono’, monospace;
font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase;
color: var(–ink-soft); cursor: pointer;
}
.flag-btn:hover { border-color: var(–gold); color: var(–gold); }
.flag-btn.active { background: var(–gold); border-color: var(–gold); color: var(–ink); }

/* Modal */
.modal-bg {
position: fixed; inset: 0; background: rgba(26,24,20,.65);
display: flex; align-items: center; justify-content: center; z-index: 100;
padding: 20px;
}
.modal {
background: var(–paper); border: 1px solid var(–ink);
padding: 32px 36px; max-width: 540px; width: 100%;
box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.modal h3 { margin-bottom: 14px; font-family: ‘Fraunces’, serif; font-size: 1.5rem; }
.modal p { color: var(–ink-soft); margin: 0 0 22px 0; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; }

/* Smaller screens */
@media (max-width: 640px) {
.wrap { padding: 24px 16px 64px; }
.question-card { padding: 22px 18px; }
.q-text { font-size: 1.1rem; }
.score-hero .score { font-size: 4.5rem; }
.domain-row { grid-template-columns: 1fr 60px 80px; gap: 10px; }
.exam-header { padding: 12px 16px; font-size: 0.78rem; }
.hero .quill { display: none; }
}
</style>

</head>
