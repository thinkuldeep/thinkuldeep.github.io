/* ============================================================
   UTILITIES
   ============================================================ */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// Render text with backticks as <code>
function fmt(s) {
  return escapeHtml(s).replace(/`([^`]+)`/g, '<code>$1</code>');
}

function letter(i) { return ['A','B','C','D','E','F'][i] || '?'; }

function formatTime(seconds) {
  if (seconds < 0) seconds = 0;
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function formatDateTime(ts) {
  const d = new Date(ts);
  return d.toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });
}

/* ============================================================
   SCORING
   Convert raw % to a scaled 100–1000 score.
   Mapped so that 70% raw = 720 scaled (the passing threshold).
   ============================================================ */
function computeScaledScore(correctCount, total) {
  if (total === 0) return MIN_SCALED;
  const pct = correctCount / total;          // 0..1
  // Piecewise linear: 0% -> 100; 70% -> 720; 100% -> 1000
  let scaled;
  if (pct <= 0.70) {
    scaled = MIN_SCALED + (720 - MIN_SCALED) * (pct / 0.70);
  } else {
    scaled = 720 + (MAX_SCALED - 720) * ((pct - 0.70) / 0.30);
  }
  return Math.round(scaled);
}

/* ============================================================
   EXAM BUILDER
   Selects N questions, attempting to mirror official weighting,
   then randomises answer order per question.
   ============================================================ */
function buildExam(opts) {
  const { numQuestions, mode, timeLimitMinutes } = opts;

  // The real exam presents 4 of 6 scenarios. Pick a scenario count that scales
  // sensibly with the requested question count, capped at the number of
  // available scenarios.
  const allScenarios = Array.from(new Set(QUESTION_POOL.map(q => q.scenario)));
  const desiredScenarios = numQuestions >= 40 ? 4
                          : numQuestions >= 24 ? 3
                          : numQuestions >= 12 ? 2
                          : 1;
  const scenarioCount = Math.min(desiredScenarios, allScenarios.length);
  const chosenScenarios = shuffle(allScenarios).slice(0, scenarioCount);

  // Group pool by scenario for sampling
  const byScenario = {};
  QUESTION_POOL.forEach(q => {
    if (!byScenario[q.scenario]) byScenario[q.scenario] = [];
    byScenario[q.scenario].push(q);
  });

  // Distribute numQuestions across chosen scenarios as evenly as possible,
  // bounded by how many questions each scenario actually has in the pool.
  const allocations = {};
  chosenScenarios.forEach(s => allocations[s] = 0);
  let remaining = numQuestions;

  // First pass: even base allocation
  const base = Math.floor(numQuestions / scenarioCount);
  chosenScenarios.forEach(s => {
    const take = Math.min(base, byScenario[s].length);
    allocations[s] = take;
    remaining -= take;
  });
  // Second pass: distribute leftovers one at a time, round-robin over scenarios
  // that still have capacity
  let guard = 0;
  while (remaining > 0 && guard++ < 1000) {
    let placed = false;
    for (const s of shuffle(chosenScenarios)) {
      if (allocations[s] < byScenario[s].length) {
        allocations[s]++;
        remaining--;
        placed = true;
        if (remaining === 0) break;
      }
    }
    if (!placed) break; // every chosen scenario is exhausted
  }

  // If chosen scenarios collectively can't supply enough questions, top up by
  // adding another scenario from the unused set.
  if (remaining > 0) {
    const unused = allScenarios.filter(s => !chosenScenarios.includes(s));
    for (const s of shuffle(unused)) {
      if (remaining === 0) break;
      chosenScenarios.push(s);
      const take = Math.min(remaining, byScenario[s].length);
      allocations[s] = take;
      remaining -= take;
    }
  }

  // Sample questions per chosen scenario and randomise their order WITHIN
  // the scenario block.
  const scenarioBlocks = chosenScenarios
    .filter(s => (allocations[s] || 0) > 0)
    .map(s => {
      const sample = shuffle(byScenario[s]).slice(0, allocations[s]);
      return { scenario: s, questions: sample };
    });

  // Randomise the ORDER of scenario blocks so it isn't always the same lineup.
  const orderedBlocks = shuffle(scenarioBlocks);

  // Flatten while preserving grouping. For each question, also randomise its
  // answer order.
  const examQuestions = [];
  orderedBlocks.forEach(block => {
    block.questions.forEach(q => {
      examQuestions.push({
        id: q.id,
        scenario: q.scenario,
        domain: q.domain,
        domainName: q.domainName,
        question: q.question,
        choiceOrder: shuffle(q.choices.map((_, i) => i))
      });
    });
  });

  return {
    version: 1,
    startedAt: Date.now(),
    finishedAt: null,
    mode,                                // 'timed' or 'untimed'
    timeLimitSeconds: mode === 'timed' ? timeLimitMinutes * 60 : null,
    elapsedSeconds: 0,
    currentIndex: 0,
    questions: examQuestions,
    answers: {},                         // { qid: selectedDisplayIndex }
    flagged: {},                         // { qid: true }
  };
}

function getQuestionData(qid) {
  return QUESTION_POOL.find(q => q.id === qid);
}

let _selectedMode = 'timed';
function selectMode(mode) {
  _selectedMode = mode;
  document.getElementById('mode-timed').classList.toggle('selected', mode === 'timed');
  document.getElementById('mode-untimed').classList.toggle('selected', mode === 'untimed');
  const tf = document.getElementById('time-field');
  if (tf) tf.style.display = mode === 'timed' ? '' : 'none';
}

function startExam() {
  const numEl = document.getElementById('num-questions');
  const timeEl = document.getElementById('time-limit');
  let numQuestions = parseInt(numEl.value, 10);
  let timeLimitMinutes = parseInt(timeEl.value, 10);
  if (isNaN(numQuestions) || numQuestions < 1) numQuestions = 60;
  numQuestions = Math.min(numQuestions, QUESTION_POOL.length);
  if (isNaN(timeLimitMinutes) || timeLimitMinutes < 1) timeLimitMinutes = 120;

  state.exam = buildExam({
    numQuestions,
    mode: _selectedMode,
    timeLimitMinutes
  });
  saveActive(state.exam);
  startTimer();
  go('exam');
}

function resumeExam() {
  state.exam = loadActive();
  if (!state.exam) { go('home'); return; }
  startTimer();
  go('exam');
}

function discardExam() {
  if (!confirm('Discard the exam in progress? This cannot be undone.')) return;
  clearActive();
  render();
}

function clearHistory() {
  if (!confirm('Clear all past attempt history?')) return;
  localStorage.removeItem(HISTORY_KEY);
  render();
}

/* ============================================================
   TIMER
   ============================================================ */
function startTimer() {
  stopTimer();
  state.exam._tickStart = Date.now();
  state.timerInterval = setInterval(() => {
    const now = Date.now();
    const delta = Math.floor((now - state.exam._tickStart) / 1000);
    state.exam._tickStart = now;
    state.exam.elapsedSeconds = (state.exam.elapsedSeconds || 0) + delta;
    saveActive(state.exam);
    // Only re-render timer text (not full re-render)
    updateTimerDisplay();
    // Check timeout for timed mode
    if (state.exam.mode === 'timed' && state.exam.timeLimitSeconds &&
        state.exam.elapsedSeconds >= state.exam.timeLimitSeconds) {
      finishExam(/*timedOut=*/true);
    }
  }, 1000);
}

function stopTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  if (!el || !state.exam) return;
  if (state.exam.mode === 'timed') {
    const remaining = state.exam.timeLimitSeconds - state.exam.elapsedSeconds;
    el.textContent = formatTime(remaining);
    el.classList.remove('warn', 'danger');
    if (remaining <= 60) el.classList.add('danger');
    else if (remaining <= 300) el.classList.add('warn');
  } else {
    el.textContent = formatTime(state.exam.elapsedSeconds);
  }
}

/* ============================================================
   RENDERING — EXAM
   ============================================================ */
function renderExam() {
  const ex = state.exam;
  if (!ex) return renderHome();
  const idx = ex.currentIndex;
  const q = ex.questions[idx];
  const qData = getQuestionData(q.id);
  const total = ex.questions.length;
  const answered = Object.keys(ex.answers).length;
  const progressPct = (answered / total) * 100;
  const userAnswerIdx = ex.answers[q.id];      // selected DISPLAY index
  const isAnswered = userAnswerIdx !== undefined;
  const showExplanations = ex.mode === 'untimed' && isAnswered;
  const flagged = !!ex.flagged[q.id];

  // Compute scenario block info: which questions share this scenario,
  // position within block, whether this is the first question in the block.
  const blockIndices = [];
  ex.questions.forEach((qq, i) => { if (qq.scenario === q.scenario) blockIndices.push(i); });
  const blockSize = blockIndices.length;
  const posInBlock = blockIndices.indexOf(idx) + 1;        // 1-based
  const isNewBlock = idx === 0 || ex.questions[idx - 1].scenario !== q.scenario;
  // Which scenario number is this overall (1st, 2nd, etc. in the exam)?
  const scenarioOrder = [];
  ex.questions.forEach(qq => {
    if (!scenarioOrder.includes(qq.scenario)) scenarioOrder.push(qq.scenario);
  });
  const scenarioNum = scenarioOrder.indexOf(q.scenario) + 1;
  const scenariosTotal = scenarioOrder.length;

  // For each displayed choice, work out its origin
  const choicesHtml = q.choiceOrder.map((origIdx, displayIdx) => {
    const c = qData.choices[origIdx];
    let cls = 'choice';
    if (!showExplanations) {
      if (userAnswerIdx === displayIdx) cls += ' selected';
    } else {
      cls += ' locked';
      if (c.correct) cls += ' correct show-expl';
      else if (displayIdx === userAnswerIdx) cls += ' incorrect-selected show-expl';
    }
    return `
      <div class="${cls}" onclick="${showExplanations ? '' : `selectAnswer(${displayIdx})`}">
        <div class="top-row">
          <div class="letter">${letter(displayIdx)}</div>
          <div class="body">${fmt(c.text)}</div>
        </div>
        ${showExplanations && (c.correct || displayIdx === userAnswerIdx) ?
          `<div class="explanation">${fmt(c.explanation)}</div>` :
          ''}
      </div>
    `;
  }).join('');

  // Question navigator grid — grouped by scenario block
  const gridBlocks = scenarioOrder.map(scenario => {
    const indices = [];
    ex.questions.forEach((qq, i) => { if (qq.scenario === scenario) indices.push(i); });
    const blockAnswered = indices.filter(i => ex.answers[ex.questions[i].id] !== undefined).length;
    const buttons = indices.map(i => {
      const qq = ex.questions[i];
      const cls = [
        ex.answers[qq.id] !== undefined ? 'answered' : '',
        ex.flagged[qq.id] ? 'flagged' : '',
        i === idx ? 'current' : ''
      ].filter(Boolean).join(' ');
      return `<button class="${cls}" onclick="gotoQuestion(${i})" title="Question ${i + 1}: ${escapeHtml(qq.scenario)}">${i + 1}</button>`;
    }).join('');
    return `
      <div class="qgrid-scenario-block">
        <div class="qgrid-scenario-label">
          <span>${escapeHtml(scenario)}</span>
          <span style="flex:1"></span>
          <span style="color:var(--ink-faint);text-transform:none;letter-spacing:0">${blockAnswered}/${indices.length}</span>
        </div>
        <div class="qgrid">${buttons}</div>
      </div>
    `;
  }).join('');

  const timerLbl = ex.mode === 'timed' ? 'Time left' : 'Elapsed';

  return `
    <div class="exam-header">
      <span class="progress-text">Question ${idx + 1} / ${total} · ${answered} answered${ex.mode === 'untimed' ? ' · Study mode' : ''}</span>
      <span>
        ${timerLbl}: <span class="timer" id="timer-display">${
          ex.mode === 'timed'
            ? formatTime(ex.timeLimitSeconds - ex.elapsedSeconds)
            : formatTime(ex.elapsedSeconds)
        }</span>
      </span>
    </div>
    <div class="progress-bar"><div class="fill" style="width: ${progressPct}%"></div></div>

    <div class="wrap" style="padding-top: 28px;">

      <div class="scenario-banner ${isNewBlock ? 'new-block' : ''}">
        <div class="left">
          <div class="kicker">Scenario ${scenarioNum} of ${scenariosTotal}</div>
          <div class="title">${escapeHtml(q.scenario)}</div>
          ${isNewBlock && idx > 0 ? `<div class="new-block-flag">New scenario</div>` : ''}
        </div>
        <div class="meta">
          Question <strong>${posInBlock}</strong> of <strong>${blockSize}</strong> in this scenario
        </div>
      </div>

      <div class="question-card">
        <div class="q-meta">
          <span class="pill domain">D${q.domain} · ${escapeHtml(q.domainName)}</span>
          <span style="flex:1"></span>
          <button class="flag-btn ${flagged ? 'active' : ''}" onclick="toggleFlag('${q.id}')">
            ${flagged ? '★ Flagged' : '☆ Flag for review'}
          </button>
        </div>
        <div class="q-text">${fmt(q.question)}</div>
        <div class="choices">${choicesHtml}</div>

        <div class="qnav">
          <button class="btn secondary" onclick="prevQuestion()" ${idx === 0 ? 'disabled' : ''}>← Previous</button>
          <span class="nums">${idx + 1} / ${total}</span>
          <div class="qnav-spacer"></div>
          ${idx < total - 1
            ? `<button class="btn" onclick="nextQuestion()">Next →</button>`
            : `<button class="btn" onclick="confirmFinish()">Finish exam</button>`}
        </div>
      </div>

      <div class="card" style="margin-top: 20px;">
        <div class="card-title">
          <span class="num">NAV</span>
          <h3 style="margin:0">Jump to question</h3>
          <span class="qnav-spacer" style="flex:1"></span>
          <span class="muted small">${answered}/${total} answered</span>
        </div>
        <div class="qgrid-section">${gridBlocks}</div>
        <div class="actions-row" style="margin-top: 18px;">
          <button class="btn ghost" onclick="goHomeConfirm()">Pause &amp; return home</button>
          <span style="flex:1"></span>
          <button class="btn" onclick="confirmFinish()">Submit exam</button>
        </div>
      </div>
    </div>
  `;
}

function selectAnswer(displayIdx) {
  const ex = state.exam;
  const q = ex.questions[ex.currentIndex];
  ex.answers[q.id] = displayIdx;
  saveActive(ex);
  render();
}

function toggleFlag(qid) {
  const ex = state.exam;
  if (ex.flagged[qid]) delete ex.flagged[qid];
  else ex.flagged[qid] = true;
  saveActive(ex);
  render();
}

function prevQuestion() {
  if (state.exam.currentIndex > 0) {
    state.exam.currentIndex--;
    saveActive(state.exam);
    render();
  }
}

function nextQuestion() {
  if (state.exam.currentIndex < state.exam.questions.length - 1) {
    state.exam.currentIndex++;
    saveActive(state.exam);
    render();
  }
}

function gotoQuestion(i) {
  state.exam.currentIndex = i;
  saveActive(state.exam);
  render();
}

function goHomeConfirm() {
  // Keep the exam saved; just go home
  stopTimer();
  go('home');
}

function confirmFinish() {
  const ex = state.exam;
  const unanswered = ex.questions.length - Object.keys(ex.answers).length;
  let msg;
  if (unanswered > 0) {
    msg = `You have ${unanswered} unanswered question${unanswered === 1 ? '' : 's'}. Submit anyway? Unanswered questions are scored as incorrect.`;
  } else {
    msg = `Submit your exam? You won't be able to change your answers afterwards.`;
  }
  if (confirm(msg)) finishExam(false);
}

/* ============================================================
   FINISH & RESULTS
   ============================================================ */
function finishExam(timedOut) {
  stopTimer();
  const ex = state.exam;
  ex.finishedAt = Date.now();

  // Compute results
  let correctCount = 0;
  const byDomain = {};
  Object.keys(DOMAIN_INFO).forEach(d => byDomain[d] = { correct: 0, total: 0 });
  const reviewItems = [];

  ex.questions.forEach(q => {
    const qData = getQuestionData(q.id);
    byDomain[q.domain].total++;
    const userIdx = ex.answers[q.id];        // display idx (or undefined)
    let isCorrect = false;
    let userOrigIdx = null;
    if (userIdx !== undefined) {
      userOrigIdx = q.choiceOrder[userIdx];
      isCorrect = qData.choices[userOrigIdx].correct === true;
    }
    if (isCorrect) {
      correctCount++;
      byDomain[q.domain].correct++;
    }
    reviewItems.push({
      qid: q.id,
      isCorrect,
      skipped: userIdx === undefined,
      userIdx,
      userOrigIdx,
      choiceOrder: q.choiceOrder,
      scenario: q.scenario,
      domain: q.domain,
      domainName: q.domainName,
      question: q.question
    });
  });

  const total = ex.questions.length;
  const scaled = computeScaledScore(correctCount, total);
  const passed = scaled >= PASS_SCORE;

  const results = {
    scaledScore: scaled,
    passed,
    correctCount,
    total,
    rawPct: total ? (correctCount / total * 100) : 0,
    byDomain,
    reviewItems,
    timedOut,
    elapsedSeconds: ex.elapsedSeconds,
    mode: ex.mode,
    startedAt: ex.startedAt,
    finishedAt: ex.finishedAt
  };
  state.results = results;

  // Save to history
  const history = loadHistory();
  history.unshift({
    finishedAt: ex.finishedAt,
    scaledScore: scaled,
    passed,
    correctCount,
    total,
    mode: ex.mode === 'timed' ? 'Timed' : 'Untimed',
    elapsedSeconds: ex.elapsedSeconds
  });
  saveHistory(history.slice(0, 50));

  clearActive();
  go('results');
}

function renderResults() {
  const r = state.results;
  if (!r) return renderHome();

  const verdict = r.passed
    ? 'Passing standard met. Well executed.'
    : r.scaledScore >= 650
      ? 'Close. Targeted review of weaker domains and you’re there.'
      : 'Significant gaps. Work the official guide alongside hands-on practice.';

  // Domain breakdown
  const breakdownHtml = Object.entries(DOMAIN_INFO).map(([d, info]) => {
    const dr = r.byDomain[d];
    const pct = dr.total ? Math.round(dr.correct / dr.total * 100) : 0;
    const fillClass = pct >= 70 ? '' : (pct >= 50 ? 'mid' : 'low');
    return `
      <div class="domain-row">
        <div>
          <div class="name">D${d} · ${escapeHtml(info.name)}</div>
          <div class="weight">Official weight: ${info.weight}% · ${dr.correct}/${dr.total} correct</div>
        </div>
        <div class="bar"><div class="fill ${fillClass}" style="width: ${pct}%"></div></div>
        <div class="pct">${pct}%</div>
      </div>
    `;
  }).join('');

  // Review items
  // Group review items by scenario, preserving the order in which scenarios appeared
  const reviewScenarioOrder = [];
  const reviewByScenario = {};
  r.reviewItems.forEach((item, i) => {
    if (!reviewByScenario[item.scenario]) {
      reviewByScenario[item.scenario] = [];
      reviewScenarioOrder.push(item.scenario);
    }
    reviewByScenario[item.scenario].push({ item, globalIdx: i });
  });

  const reviewHtml = reviewScenarioOrder.map(scenario => {
    const group = reviewByScenario[scenario];
    const correct = group.filter(g => g.item.isCorrect).length;
    const wrong = group.filter(g => !g.item.isCorrect && !g.item.skipped).length;
    const skipped = group.filter(g => g.item.skipped).length;

    const itemsHtml = group.map(({ item, globalIdx }) => {
      const qData = getQuestionData(item.qid);
      const marker = item.skipped ? 'skipped' : (item.isCorrect ? 'correct' : 'wrong');
      const status = item.skipped ? 'Skipped' : (item.isCorrect ? 'Correct' : 'Incorrect');

      const choicesHtml = item.choiceOrder.map((origIdx, displayIdx) => {
        const c = qData.choices[origIdx];
        let cls = 'choice locked';
        if (c.correct) cls += ' correct show-expl';
        else if (displayIdx === item.userIdx) cls += ' incorrect-selected show-expl';
        const showExpl = c.correct || displayIdx === item.userIdx;
        return `
          <div class="${cls}">
            <div class="top-row">
              <div class="letter">${letter(displayIdx)}</div>
              <div class="body">${fmt(c.text)}</div>
            </div>
            ${showExpl ? `<div class="explanation">${fmt(c.explanation)}</div>` : ''}
          </div>
        `;
      }).join('');

      return `
        <details class="review-item">
          <summary>
            <span class="marker ${marker}"></span>
            <span class="summary-text">Q${globalIdx + 1}. ${fmt(item.question.length > 110 ? item.question.slice(0, 110) + '…' : item.question)}</span>
            <span class="summary-meta">D${item.domain} · ${status}</span>
          </summary>
          <div class="review-body">
            <div class="q-meta">
              <span class="pill domain">D${item.domain} · ${escapeHtml(item.domainName)}</span>
            </div>
            <div class="q-text">${fmt(item.question)}</div>
            <div class="choices">${choicesHtml}</div>
          </div>
        </details>
      `;
    }).join('');

    return `
      <div class="review-scenario-header">
        <h3>${escapeHtml(scenario)}</h3>
        <span class="stats">
          <span class="ok">${correct} correct</span>
          ${wrong ? ` · <span class="bad">${wrong} wrong</span>` : ''}
          ${skipped ? ` · <span>${skipped} skipped</span>` : ''}
          · ${group.length} total
        </span>
      </div>
      ${itemsHtml}
    `;
  }).join('');

  return `
    <div class="wrap">
      <div class="topbar">
        <span class="stamp">● CCA-F</span>
        <div class="right">
          <span>Results</span>
          <span>·</span>
          <span>${formatDateTime(r.finishedAt)}</span>
        </div>
      </div>

      <div class="score-hero">
        <div class="label">Scaled score</div>
        <div class="score ${r.passed ? 'pass' : 'fail'}">${r.scaledScore}<span class="of">/1000</span></div>
        <div class="verdict ${r.passed ? 'pass' : 'fail'}">${escapeHtml(verdict)}</div>
        <div class="raw">
          ${r.correctCount} of ${r.total} correct (${r.rawPct.toFixed(1)}%)
          · ${r.mode === 'timed' ? 'Timed' : 'Untimed'} · ${formatTime(r.elapsedSeconds)}
          ${r.timedOut ? ' · Time expired' : ''}
        </div>
        <div class="raw">Pass mark: ${PASS_SCORE}</div>
      </div>

      <div class="card">
        <div class="card-title">
          <span class="num">DOMAIN</span>
          <h2>Performance by domain</h2>
        </div>
        <div class="breakdown">${breakdownHtml}</div>
        <p class="small muted" style="margin-top:16px">
          Aim for ≥70% in every domain. A weak domain can drag your scaled score under 720 even if the others are strong.
        </p>
      </div>

      <div class="card review-section">
        <div class="card-title">
          <span class="num">REVIEW</span>
          <h2>Every question, with explanations</h2>
        </div>
        <p class="small muted" style="margin-top:-8px; margin-bottom:18px">
          Grouped by scenario, in the order you saw them. Click any question to expand —
          the correct answer and your answer (if different) both show their rationale.
        </p>
        ${reviewHtml}
      </div>

      <div class="actions-row" style="margin-top: 32px; justify-content: center;">
        <button class="btn lg" onclick="go('home')">← Back to home</button>
      </div>
    </div>
  `;
}

/* ============================================================
   MAIN RENDER
   ============================================================ */
function render() {
  const app = document.getElementById('app');
  let html;
  if (state.view === 'exam' && state.exam) html = renderExam();
  else if (state.view === 'results' && state.results) html = renderResults();
  else html = renderHome();
  app.innerHTML = html;

  // Re-attach timer display reference after render (no-op if no exam)
  if (state.view === 'exam' && state.exam && !state.timerInterval) startTimer();
  if (state.view !== 'exam') stopTimer();
}

// Initial mount
document.addEventListener('DOMContentLoaded', () => {
  const active = loadActive();
  if (active) {
    // Stay on home; user chooses to resume
    state.exam = null;
  }
  render();
});
</script>
